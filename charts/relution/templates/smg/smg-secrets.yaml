{{- if .Values.smg.app.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "relution.fullname" . }}-smg-secrets
  labels:
    {{- include "relution.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $val := .Values.smg.app.secrets }}
  {{ $key }}: {{ $val | b64enc }}
  {{ end -}}
{{- end }}
