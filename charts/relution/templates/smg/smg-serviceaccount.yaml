{{- if .Values.smg.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "relution-smg.serviceAccountName" . }}
  labels:
    {{- include "relution.labels" . | nindent 4 }}
  {{- with .Values.smg.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
