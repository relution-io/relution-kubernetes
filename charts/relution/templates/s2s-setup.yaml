{{- if .Values.s2s.enabled }}
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "relution.fullname" . }}-s2s-setup
  labels:
    {{- include "relution.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/bin/bash -e
    apt-get update && apt-get install -y \
      strongswan={{ .Values.s2s.packages.strongswan }} \
      strongswan-swanctl={{ .Values.s2s.packages.strongswan }} \
      libstrongswan-extra-plugins={{ .Values.s2s.packages.strongswan }} \
      iptables={{ .Values.s2s.packages.iptables }};

    {{- range .Values.s2s.remote.subnets }}
    iptables -C POSTROUTING -t nat -d {{ . }} -j SNAT --to-source {{ required "s2s.local.nat is required."  $.Values.s2s.local.nat }} || \
    iptables -A POSTROUTING -t nat -d {{ . }} -j SNAT --to-source {{ required "s2s.local.nat is required."  $.Values.s2s.local.nat }};
    {{- end }}

    /usr/lib/ipsec/charon;
  charon-custom.conf: |
    charon {
      start-scripts {
        autoload = /opt/s2s/autoload.sh
      }

      filelog {
        stdout {
          default = {{ .Values.s2s.logLevel | default 1 }}
          enc = {{ .Values.s2s.logLevel | default 1 }}
        }
      }
    }
  s2s.conf: |
    connections {
      gw-gw {
        remote_addrs = {{ required "s2s.remote.ip is required." .Values.s2s.remote.ip }}
        version      = 2
        proposals    = {{ .Values.s2s.ike.proposals }}

        local {
          id   = {{ .Values.s2s.local.id | default "relution" }}
          auth = psk
        }
        remote {
          auth = psk
        }

        children {
          net-net {
            local_ts      = {{ required "s2s.local.transferSubnet is required." .Values.s2s.local.transferSubnet }}
            remote_ts     = {{ join "," .Values.s2s.remote.subnets }}
            start_action  = {{ .Values.s2s.ipsec.startAction | default "start" }}
            close_action  = {{ .Values.s2s.ipsec.closeAction | default "start" }}
            dpd_action    = {{ .Values.s2s.ipsec.dpdAction | default "restart" }}
            updown        = /usr/lib/ipsec/_updown iptables
            esp_proposals = {{ .Values.s2s.ipsec.proposals }}
          }
        }
      }
    }
  autoload.sh: |
    #!/bin/bash -e
    swanctl --load-all;
  health.sh: |
    #!/bin/bash -e
    OUTPUT=$(swanctl --list-sas 2>/dev/null)

    if [[ -z "$OUTPUT" ]]; then
      echo "CRITICAL: No IKE SAs found (swanctl returned nothing)."
      exit 1
    fi

    # Check for an established IKE SA
    if ! grep -q "ESTABLISHED" <<< "$OUTPUT"; then
      echo "CRITICAL: No established IKE SA found."
      exit 1
    fi

    # Check for an installed ESP SA
    if ! grep -q "INSTALLED" <<< "$OUTPUT"; then
      echo "CRITICAL: No installed ESP SA found."
      exit 1
    fi

    echo "OK: Tunnel is established."
    exit 0
{{- end }}
